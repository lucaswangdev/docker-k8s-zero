apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  selector:
    app: my-app                 # 找所有标签是 app=my-app 的 Pod
  ports:
  - port: 80                   # Service 对外暴露 80 端口
    targetPort: 8080            # 流量转发到 Pod 的 8080
  type: NodePort                # Mac 本地测试用 NodePort
